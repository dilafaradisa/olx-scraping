services:
  olx_data_warehouse:
    image: postgres:15
    container_name: olx_data_warehouse
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - olx_data_warehouse:/var/lib/postgresql/data
      - ./helper/:/docker-entrypoint-initdb.d
  

volumes:
  olx_data_warehouse:
